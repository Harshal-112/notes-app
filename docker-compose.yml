services:
  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: notes-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: notes-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - notes_db:/app/data  

volumes:
  notes_db:
