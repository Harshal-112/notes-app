<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoteVault – Your Smart Notes Space</title>
  <meta name="description" content="NoteVault is a premium, beautifully designed notes app to capture, organize, and recall your thoughts with style." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient Background Orbs -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
      </div>
      <span class="logo-text">NoteVault</span>
    </div>

    <div class="sidebar-search">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search notes…" autocomplete="off" />
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-title">Views</div>
      <button class="nav-item active" id="nav-all" data-filter="all">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        All Notes
        <span class="nav-count" id="count-all">0</span>
      </button>
      <button class="nav-item" id="nav-pinned" data-filter="pinned">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Pinned
        <span class="nav-count" id="count-pinned">0</span>
      </button>
      <button class="nav-item" id="nav-trash" data-filter="trash">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Trash
        <span class="nav-count" id="count-trash">0</span>
      </button>

      <div class="nav-section-title" style="margin-top:20px;">Categories</div>
      <div id="category-list" class="category-list"></div>
      <button class="add-category-btn" id="add-category-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Category
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="storage-bar">
        <div class="storage-label">
          <span>Storage</span>
          <span id="storage-used">0 KB</span>
        </div>
        <div class="storage-track"><div class="storage-fill" id="storage-fill"></div></div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menu-toggle" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 id="page-title">All Notes</h1>
      </div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="view-btn active" id="view-grid" title="Grid view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
          <button class="view-btn" id="view-list" title="List view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          </button>
        </div>
        <button class="new-note-btn" id="new-note-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Note
        </button>
      </div>
    </header>

    <!-- Notes Grid -->
    <div class="notes-container">
      <div class="notes-grid" id="notes-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </div>
        <h3 id="empty-title">No notes yet</h3>
        <p id="empty-desc">Click "New Note" to start capturing your thoughts.</p>
      </div>
    </div>
  </main>

  <!-- Note Modal (Create/Edit) -->
  <div class="modal-overlay" id="note-modal" style="display:none;">
    <div class="modal" id="note-modal-box">
      <div class="modal-header">
        <div class="modal-title-row">
          <input type="text" id="note-title-input" placeholder="Note title…" maxlength="120" autocomplete="off" />
          <div class="modal-header-actions">
            <button class="modal-pin-btn" id="modal-pin-btn" title="Pin note">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </button>
            <button class="modal-close-btn" id="note-modal-close" title="Close">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="modal-meta-row">
          <select id="note-category-select" class="meta-select">
            <option value="">No Category</option>
          </select>
          <div class="color-picker-row">
            <span class="meta-label">Color</span>
            <div class="color-swatches" id="color-swatches">
              <button class="swatch active" data-color="default" style="background: linear-gradient(135deg,#1e2535,#252d42)" title="Default"></button>
              <button class="swatch" data-color="rose" style="background: linear-gradient(135deg,#3d1a26,#5c1f35)" title="Rose"></button>
              <button class="swatch" data-color="amber" style="background: linear-gradient(135deg,#3d2e0f,#5c4515)" title="Amber"></button>
              <button class="swatch" data-color="emerald" style="background: linear-gradient(135deg,#0f2e1e,#154529)" title="Emerald"></button>
              <button class="swatch" data-color="violet" style="background: linear-gradient(135deg,#1f1545,#2e1e65)" title="Violet"></button>
              <button class="swatch" data-color="sky" style="background: linear-gradient(135deg,#0f2535,#154c72)" title="Sky"></button>
            </div>
          </div>
        </div>
      </div>

      <!-- Formatting Toolbar -->
      <div class="editor-toolbar">
        <button class="toolbar-btn" data-cmd="bold" title="Bold"><b>B</b></button>
        <button class="toolbar-btn" data-cmd="italic" title="Italic"><i>I</i></button>
        <button class="toolbar-btn" data-cmd="underline" title="Underline"><u>U</u></button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" data-cmd="insertUnorderedList" title="Bullet List">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        </button>
        <button class="toolbar-btn" data-cmd="insertOrderedList" title="Numbered List">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4" stroke="currentColor" stroke-width="1.8"/><path d="M4 10H5" stroke="currentColor" stroke-width="1.8"/><path d="M3 14h2l-2 3h3" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" data-cmd="formatBlock" data-val="H2" title="Heading">H</button>
        <button class="toolbar-btn" data-cmd="formatBlock" data-val="blockquote" title="Blockquote">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" id="clear-format-btn" title="Clear formatting">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/><line x1="2" y1="22" x2="22" y2="2"/></svg>
        </button>
      </div>

      <div class="editor-area" id="note-body" contenteditable="true" spellcheck="true" placeholder="Start writing your note…"></div>

      <div class="modal-footer">
        <div class="tags-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
          <input type="text" id="tag-input" placeholder="Add tag and press Enter…" autocomplete="off" />
          <div class="tags-list" id="tags-list"></div>
        </div>
        <div class="modal-actions">
          <span class="word-count" id="word-count">0 words</span>
          <button class="btn-secondary" id="note-delete-btn" style="display:none;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Delete
          </button>
          <button class="btn-primary" id="note-save-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            Save Note
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Category Add Modal -->
  <div class="modal-overlay" id="cat-modal" style="display:none;">
    <div class="modal modal-sm" id="cat-modal-box">
      <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.07);padding-bottom:16px;">
        <h3 style="font-size:1.1rem;font-weight:600;color:var(--text-primary);">New Category</h3>
        <button class="modal-close-btn" id="cat-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div style="padding:20px 0 10px;">
        <input type="text" id="cat-name-input" class="cat-input" placeholder="Category name…" maxlength="30" autocomplete="off" />
        <div class="cat-color-row" id="cat-colors">
          <button class="cat-swatch active" data-ccat="#6366f1" style="background:#6366f1;"></button>
          <button class="cat-swatch" data-ccat="#ec4899" style="background:#ec4899;"></button>
          <button class="cat-swatch" data-ccat="#f59e0b" style="background:#f59e0b;"></button>
          <button class="cat-swatch" data-ccat="#10b981" style="background:#10b981;"></button>
          <button class="cat-swatch" data-ccat="#06b6d4" style="background:#06b6d4;"></button>
          <button class="cat-swatch" data-ccat="#f97316" style="background:#f97316;"></button>
        </div>
      </div>
      <div style="display:flex;justify-content:flex-end;gap:10px;">
        <button class="btn-secondary" id="cat-cancel-btn">Cancel</button>
        <button class="btn-primary" id="cat-save-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
